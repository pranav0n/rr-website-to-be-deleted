<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Still thinking about them? — Break. Release. Reset.</title>
  <meta name="description" content="Still thinking about them? Good. You're not ready to date yet. First… come break what's still holding you back." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="hero" aria-label="Still thinking about them?">
    <div class="hero__image" role="img" aria-label="Woman in coveralls holding a sledgehammer in front of a wall painted with the words Break Release Reset"></div>
    <div class="hero__overlay" aria-hidden="true"></div>

    <div class="hero__content">
      <h1 class="hero__title">
        Still thinking<br />
        about <em>them?</em>
      </h1>

      <p class="hero__lede">
        Good. You're <span class="accent">not ready</span> to date yet.
      </p>

      <span class="hero__divider" aria-hidden="true"></span>

      <p class="hero__sub">
        First… come break what's still<br />
        holding you back.
      </p>

      <a href="#request" class="cta" id="ctaBtn">
        <span>REQUEST YOUR SPOT</span>
      </a>

      <ul class="features" aria-label="Experience details">
        <li class="feature">
          <span class="feature__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="4.5" y="10.5" width="15" height="10" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
              <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <circle cx="12" cy="15.5" r="1.2" fill="currentColor"/>
              <path d="M12 16.5v1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="feature__label">PRIVATE<br/>EXPERIENCE</span>
        </li>

        <li class="feature__sep" aria-hidden="true"></li>

        <li class="feature">
          <span class="feature__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="9" r="3" stroke="currentColor" stroke-width="1.6"/>
              <path d="M3.5 19c.6-3 3-4.5 5.5-4.5S14 16 14.5 19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <circle cx="16.5" cy="10" r="2.3" stroke="currentColor" stroke-width="1.6"/>
              <path d="M14 19c.4-2.2 2-3.4 3.8-3.4 1.7 0 3.2 1.1 3.7 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="feature__label">LIMITED<br/>SPOTS</span>
        </li>

        <li class="feature__sep" aria-hidden="true"></li>

        <li class="feature">
          <span class="feature__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3.5 9.5a1.5 1.5 0 0 1 1.5-1.5h14a1.5 1.5 0 0 1 1.5 1.5v1.7a1.6 1.6 0 0 0 0 3.1v1.7a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 16v-1.7a1.6 1.6 0 0 0 0-3.1V9.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M10 9v7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="1.5 2"/>
            </svg>
          </span>
          <span class="feature__label">NO COST</span>
        </li>
      </ul>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
